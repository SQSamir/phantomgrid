name: ci

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          for f in backend/services/*/requirements.txt; do pip install -r "$f" || true; done
          pip install ruff==0.6.4 mypy==1.11.1 pytest==8.3.2

      - name: Python lint
        run: |
          ruff check backend || true
          python -m compileall -q backend

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Frontend install/build
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Validate docker-compose
        run: docker compose config >/dev/null

      - name: Build containers
        run: docker compose build

      - name: Run stack (smoke)
        run: |
          docker compose up -d postgres redis zookeeper kafka api-gateway auth-service honeypot-engine realtime
          sleep 30

      - name: Smoke tests via docker run stack
        run: |
          retry() { n=0; until [ "$n" -ge 15 ]; do "$@" && return 0; n=$((n+1)); sleep 2; done; return 1; }

          # API gateway health
          retry curl -fsS http://localhost:8080/health

          # HTTP honeypot banner/page
          retry bash -lc 'curl -fsS http://localhost:18080/ | grep -qi "apache2 ubuntu default page"'

          # AWS metadata honeypot
          retry bash -lc 'curl -fsS http://localhost:18169/latest/meta-data/ | grep -q "instance-id"'
          retry bash -lc 'curl -fsS http://localhost:18169/latest/meta-data/iam/security-credentials/ | grep -q "EC2InstanceRole-WebServer"'

          # Docker API honeypot
          retry bash -lc 'curl -fsS http://localhost:12375/v1.44/_ping | grep -q "OK"'
          retry bash -lc 'curl -fsS http://localhost:12375/v1.44/containers/json | grep -q "web-server"'

          # K8s API honeypot
          retry bash -lc 'curl -fsS http://localhost:16443/version | grep -q "v1.28.4"'

          # Redis infra ping
          retry bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6379; printf "PING\r\n" >&3; timeout 3 cat <&3 | grep -q PONG'

          # FTP honeypot banner check
          retry bash -lc 'exec 3<>/dev/tcp/127.0.0.1/10021; timeout 3 head -c 256 <&3 | grep -q "ProFTPD"'

          # SSH honeypot banner check
          retry bash -lc 'exec 3<>/dev/tcp/127.0.0.1/10022; timeout 3 head -c 256 <&3 | grep -q "SSH-2.0-OpenSSH"'

          # DNS honeypot NXDOMAIN check (rcode=3)
          python - << 'PY'
          import socket, random, struct
          tid = random.randint(0, 65535)
          header = struct.pack("!HHHHHH", tid, 0x0100, 1, 0, 0, 0)
          qname = b"\x04test\x03com\x00"
          question = qname + struct.pack("!HH", 1, 1)
          pkt = header + question
          s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
          s.settimeout(5)
          s.sendto(pkt, ("127.0.0.1", 15353))
          data, _ = s.recvfrom(512)
          flags = struct.unpack("!H", data[2:4])[0]
          rcode = flags & 0x000F
          assert rcode == 3, f"expected NXDOMAIN(3), got {rcode}"
          PY

      - name: Tear down stack
        if: always()
        run: docker compose down -v --remove-orphans
