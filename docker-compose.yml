version: "3.9"
networks:
  phantomgrid-net:
    driver: bridge
volumes:
  pg_data:
  redis_data:
  kafka_data:
  clickhouse_data:
  minio_data:
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-phantomgrid}
      POSTGRES_USER: ${POSTGRES_USER:-phantomgrid}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes: ["pg_data:/var/lib/postgresql/data"]
    networks: [phantomgrid-net]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redis_data:/data"]
    networks: [phantomgrid-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks: [phantomgrid-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes: ["kafka_data:/var/lib/kafka/data"]
    networks: [phantomgrid-net]

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    volumes: ["clickhouse_data:/var/lib/clickhouse"]
    networks: [phantomgrid-net]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change_me}
    volumes: ["minio_data:/data"]
    networks: [phantomgrid-net]

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    env_file: .env
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public.pem
    volumes:
      - ./secrets/jwt_public.pem:/run/secrets/jwt_public.pem:ro
    ports: ["8080:8080"]
    depends_on: [auth-service]
    networks: [phantomgrid-net]

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env
    environment:
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private.pem
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public.pem
    volumes:
      - ./secrets/jwt_private.pem:/run/secrets/jwt_private.pem:ro
      - ./secrets/jwt_public.pem:/run/secrets/jwt_public.pem:ro
    depends_on: [postgres, redis]
    networks: [phantomgrid-net]


  decoy-manager:
    build:
      context: .
      dockerfile: services/decoy-manager/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on: [postgres]
    networks: [phantomgrid-net]

  honeypot-engine:
    build:
      context: .
      dockerfile: services/honeypot-engine/Dockerfile
    env_file: .env
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    depends_on: [kafka]
    ports: ["10022:10022", "18080:18080"]
    networks: [phantomgrid-net]

  event-processor:
    build:
      context: .
      dockerfile: services/event-processor/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    depends_on: [postgres, kafka]
    networks: [phantomgrid-net]

  realtime:
    build:
      context: .
      dockerfile: services/realtime/Dockerfile
    env_file: .env
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    depends_on: [kafka]
    ports: ["8085:8085"]
    networks: [phantomgrid-net]

  analytics:
    build:
      context: .
      dockerfile: services/analytics/Dockerfile
    env_file: .env
    ports: ["8086:8086"]
    networks: [phantomgrid-net]

  alert-engine:
    build:
      context: .
      dockerfile: services/alert-engine/Dockerfile
    env_file: .env
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS}
    depends_on: [kafka]
    networks: [phantomgrid-net]

  mitre-mapper:
    build:
      context: ./services-python/mitre-mapper
      dockerfile: Dockerfile
    ports: ["8084:8084"]
    networks: [phantomgrid-net]

  tenant-manager:
    build:
      context: .
      dockerfile: services/tenant-manager/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on: [postgres]
    ports: ["8088:8088"]
    networks: [phantomgrid-net]

  notifications:
    build:
      context: ./services-python/notifications
      dockerfile: Dockerfile
    ports: ["8087:8087"]
    networks: [phantomgrid-net]

  sensor:
    build:
      context: .
      dockerfile: services/sensor/Dockerfile
    env_file: .env
    environment:
      SENSOR_GATEWAY_URL: http://api-gateway:8080/api/v1/sensors/heartbeat
      SENSOR_NAME: sensor-local
    depends_on: [api-gateway]
    networks: [phantomgrid-net]

  integrations:
    build:
      context: .
      dockerfile: services/integrations/Dockerfile
    ports: ["8089:8089"]
    networks: [phantomgrid-net]
