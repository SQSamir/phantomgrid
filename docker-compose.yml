services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: phantomgrid
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: phantomgrid
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U phantomgrid -d phantomgrid
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test:
      - CMD
      - bash
      - -lc
      - exec 3<>/dev/tcp/127.0.0.1/2181; echo ruok >&3; timeout 2 cat <&3 | grep -q imok
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test:
      - CMD-SHELL
      - kafka-broker-api-versions --bootstrap-server localhost:9092 2>/dev/null
      interval: 20s
      timeout: 10s
      retries: 10
  clickhouse:
    image: clickhouse/clickhouse-server:24
  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
  api-gateway:
    build:
      context: .
      dockerfile: backend/services/api-gateway/Dockerfile
    ports:
    - 8080:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    working_dir: /app/backend/services/api-gateway
    environment:
      PYTHONPATH: /app
  auth-service:
    build:
      context: .
      dockerfile: backend/services/auth-service/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/backend/services/auth-service
    environment:
      PYTHONPATH: /app
  decoy-manager:
    build:
      context: .
      dockerfile: backend/services/decoy-manager/Dockerfile
    working_dir: /app/backend/services/decoy-manager
    environment:
      PYTHONPATH: /app
  honeypot-engine:
    build:
      context: .
      dockerfile: backend/services/honeypot-engine/Dockerfile
    ports:
    - 10022:10022
    - 10023:10023
    - 10021:10021
    - 16379:16379
    - 18080:18080
    - 15353:15353/udp
    working_dir: /app/backend/services/honeypot-engine
    environment:
      PYTHONPATH: /app
  event-processor:
    build:
      context: .
      dockerfile: backend/services/event-processor/Dockerfile
    working_dir: /app/backend/services/event-processor
    environment:
      PYTHONPATH: /app
  alert-engine:
    build:
      context: .
      dockerfile: backend/services/alert-engine/Dockerfile
    working_dir: /app/backend/services/alert-engine
    environment:
      PYTHONPATH: /app
  analytics:
    build:
      context: .
      dockerfile: backend/services/analytics/Dockerfile
    working_dir: /app/backend/services/analytics
    environment:
      PYTHONPATH: /app
  mitre-mapper:
    build:
      context: .
      dockerfile: backend/services/mitre-mapper/Dockerfile
    working_dir: /app/backend/services/mitre-mapper
    environment:
      PYTHONPATH: /app
  realtime:
    build:
      context: .
      dockerfile: backend/services/realtime/Dockerfile
    working_dir: /app/backend/services/realtime
    environment:
      PYTHONPATH: /app
  notifications:
    build:
      context: .
      dockerfile: backend/services/notifications/Dockerfile
    working_dir: /app/backend/services/notifications
    environment:
      PYTHONPATH: /app
  tenant-manager:
    build:
      context: .
      dockerfile: backend/services/tenant-manager/Dockerfile
    working_dir: /app/backend/services/tenant-manager
    environment:
      PYTHONPATH: /app
  integrations:
    build:
      context: .
      dockerfile: backend/services/integrations/Dockerfile
    working_dir: /app/backend/services/integrations
    environment:
      PYTHONPATH: /app
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
    - ./frontend:/app
    command: sh -c "npm i && npm run dev"
    ports:
    - 3000:3000
