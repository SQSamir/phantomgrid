x-app-env: &app-env
  PYTHONPATH: /app
  POSTGRES_DSN: postgresql+asyncpg://phantomgrid:change_me@postgres:5432/phantomgrid
  REDIS_URL: redis://redis:6379/0
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_BROKERS: kafka:9092
  JWT_SECRET: ${JWT_SECRET:-dev_secret_key_change_me_in_production_32ch}
  # Fernet key below is base64url of 32 bytes of "dev..." — FOR LOCAL DEV ONLY
  MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY:-ZGV2ZGV2ZGV2ZGV2ZGV2ZGV2ZGV2ZGV2ZGV2ZGV2ZGU=}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
  # Phantom AI Engine (optional — leave blank to use static fallback)
  PHANTOM_AI_ENABLED: ${PHANTOM_AI_ENABLED:-false}
  LLM_PROVIDER: ${LLM_PROVIDER:-openai}
  LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
  LLM_API_KEY: ${LLM_API_KEY:-}
  # Active Response
  FIREWALL_TYPE: ${FIREWALL_TYPE:-none}
  SOAR_WEBHOOK_URL: ${SOAR_WEBHOOK_URL:-}
  JIRA_URL: ${JIRA_URL:-}
  JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
  SERVICENOW_URL: ${SERVICENOW_URL:-}
  THEHIVE_URL: ${THEHIVE_URL:-}
  THEHIVE_API_KEY: ${THEHIVE_API_KEY:-}

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: phantomgrid
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: phantomgrid
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U phantomgrid -d phantomgrid
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test:
      - CMD
      - bash
      - -lc
      - cub zk-ready localhost:2181 30
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
    - zookeeper
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test:
      - CMD-SHELL
      - kafka-broker-api-versions --bootstrap-server localhost:9092 2>/dev/null
      interval: 20s
      timeout: 10s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:23.8

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123

  api-gateway:
    build:
      context: .
      dockerfile: backend/services/api-gateway/Dockerfile
    ports:
    - 8080:8080
    depends_on:
    - postgres
    - redis
    - kafka
    working_dir: /app/backend/services/api-gateway
    environment:
      <<: *app-env

  auth-service:
    build:
      context: .
      dockerfile: backend/services/auth-service/Dockerfile
    depends_on:
    - postgres
    working_dir: /app/backend/services/auth-service
    environment:
      <<: *app-env

  decoy-manager:
    build:
      context: .
      dockerfile: backend/services/decoy-manager/Dockerfile
    working_dir: /app/backend/services/decoy-manager
    environment:
      <<: *app-env

  honeypot-engine:
    build:
      context: .
      dockerfile: backend/services/honeypot-engine/Dockerfile
    ports:
    - 10022:10022
    - 10023:10023
    - 10021:10021
    - 10025:10025
    - 10161:10161/udp
    - 10445:10445
    - 12375:12375
    - 13306:13306
    - 15432:15432
    - 15900:15900
    - 16379:16379
    - 16443:16443
    - 18080:18080
    - 18169:18169
    - 15353:15353/udp
    # New protocols
    - 13389:13389
    - 11433:11433
    - 10502:10502
    - 10020:10020
    - 10102:10102
    - 11883:11883
    - 15683:15683/udp
    working_dir: /app/backend/services/honeypot-engine
    environment:
      <<: *app-env

  event-processor:
    build:
      context: .
      dockerfile: backend/services/event-processor/Dockerfile
    working_dir: /app/backend/services/event-processor
    environment:
      <<: *app-env

  alert-engine:
    build:
      context: .
      dockerfile: backend/services/alert-engine/Dockerfile
    working_dir: /app/backend/services/alert-engine
    environment:
      <<: *app-env

  analytics:
    build:
      context: .
      dockerfile: backend/services/analytics/Dockerfile
    working_dir: /app/backend/services/analytics
    environment:
      <<: *app-env

  mitre-mapper:
    build:
      context: .
      dockerfile: backend/services/mitre-mapper/Dockerfile
    working_dir: /app/backend/services/mitre-mapper
    environment:
      <<: *app-env

  realtime:
    build:
      context: .
      dockerfile: backend/services/realtime/Dockerfile
    working_dir: /app/backend/services/realtime
    environment:
      <<: *app-env

  notifications:
    build:
      context: .
      dockerfile: backend/services/notifications/Dockerfile
    working_dir: /app/backend/services/notifications
    environment:
      <<: *app-env

  tenant-manager:
    build:
      context: .
      dockerfile: backend/services/tenant-manager/Dockerfile
    working_dir: /app/backend/services/tenant-manager
    environment:
      <<: *app-env

  integrations:
    build:
      context: .
      dockerfile: backend/services/integrations/Dockerfile
    working_dir: /app/backend/services/integrations
    environment:
      <<: *app-env

  active-response:
    build:
      context: .
      dockerfile: backend/services/active-response/Dockerfile
    working_dir: /app/backend/services/active-response
    depends_on:
    - kafka
    - redis
    environment:
      <<: *app-env

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
    - ./frontend:/app
    command: sh -c "npm i && npm run dev"
    ports:
    - 3000:3000

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile.migrate
    environment:
      POSTGRES_DSN: postgresql+asyncpg://phantomgrid:change_me@postgres:5432/phantomgrid
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
