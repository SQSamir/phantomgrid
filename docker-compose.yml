services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment: { POSTGRES_USER: phantomgrid, POSTGRES_PASSWORD: change_me, POSTGRES_DB: phantomgrid }
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U phantomgrid -d phantomgrid"], interval: 10s, timeout: 5s, retries: 5 }
  redis:
    image: redis:7-alpine
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 10s, timeout: 5s, retries: 5 }
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment: { ZOOKEEPER_CLIENT_PORT: 2181 }
    healthcheck: { test: ["CMD", "bash", "-lc", "echo ruok | nc -w 2 localhost 2181 | grep imok"], interval: 10s, timeout: 5s, retries: 5 }
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: { zookeeper: {condition: service_healthy} }
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck: { test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 2>/dev/null"], interval: 20s, timeout: 10s, retries: 10 }
  clickhouse: { image: clickhouse/clickhouse-server:24 }
  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment: { MINIO_ROOT_USER: minio, MINIO_ROOT_PASSWORD: minio123 }
  api-gateway: { build: ./backend/services/api-gateway, ports: ["8080:8080"], depends_on: {postgres:{condition: service_healthy},redis:{condition: service_healthy},kafka:{condition: service_healthy}} }
  auth-service: { build: ./backend/services/auth-service, depends_on: {postgres:{condition: service_healthy}} }
  decoy-manager: { build: ./backend/services/decoy-manager }
  honeypot-engine: { build: ./backend/services/honeypot-engine, ports: ["10022:10022","10023:10023","10021:10021","16379:16379","18080:18080","15353:15353/udp"] }
  event-processor: { build: ./backend/services/event-processor }
  alert-engine: { build: ./backend/services/alert-engine }
  analytics: { build: ./backend/services/analytics }
  mitre-mapper: { build: ./backend/services/mitre-mapper }
  realtime: { build: ./backend/services/realtime }
  notifications: { build: ./backend/services/notifications }
  tenant-manager: { build: ./backend/services/tenant-manager }
  integrations: { build: ./backend/services/integrations }
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes: ["./frontend:/app"]
    command: sh -c "npm i && npm run dev"
    ports: ["3000:3000"]
