networks:
  phantomgrid-net:
    driver: bridge
volumes:
  pg_data:
  redis_data:
  kafka_data:
  clickhouse_data:
  minio_data:
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: ["pg_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [phantomgrid-net]

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [phantomgrid-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: always
    environment: { ZOOKEEPER_CLIENT_PORT: 2181 }
    networks: [phantomgrid-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: always
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes: ["kafka_data:/var/lib/kafka/data"]
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks: [phantomgrid-net]

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: always
    volumes: ["clickhouse_data:/var/lib/clickhouse"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [phantomgrid-net]

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes: ["minio_data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [phantomgrid-net]

  api-gateway:
    build: { context: ., dockerfile: services/api-gateway/Dockerfile }
    restart: always
    env_file: .env
    depends_on:
      auth-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    ports: ["8080:8080"]
    networks: [phantomgrid-net]

  auth-service:
    build: { context: ., dockerfile: services/auth-service/Dockerfile }
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    networks: [phantomgrid-net]

  decoy-manager:
    build: { context: ., dockerfile: services/decoy-manager/Dockerfile }
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    networks: [phantomgrid-net]

  honeypot-engine:
    build: { context: ., dockerfile: services/honeypot-engine/Dockerfile }
    restart: always
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
        reservations:
          memory: 512m
          cpus: '0.5'
    ports: ["10022:10022", "10023:10023", "16379:16379", "18080:18080"]
    networks: [phantomgrid-net]

  event-processor:
    build: { context: ., dockerfile: services/event-processor/Dockerfile }
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    networks: [phantomgrid-net]

  alert-engine:
    build: { context: ., dockerfile: services/alert-engine/Dockerfile }
    restart: always
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    networks: [phantomgrid-net]

  realtime:
    build: { context: ., dockerfile: services/realtime/Dockerfile }
    restart: always
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    ports: ["8085:8085"]
    networks: [phantomgrid-net]

  analytics:
    build: { context: ., dockerfile: services/analytics/Dockerfile }
    restart: always
    env_file: .env
    depends_on:
      clickhouse:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    ports: ["8086:8086"]
    networks: [phantomgrid-net]

  mitre-mapper:
    build: { context: ./services-python/mitre-mapper, dockerfile: Dockerfile }
    restart: always
    depends_on:
      clickhouse:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    ports: ["8084:8084"]
    networks: [phantomgrid-net]

  notifications:
    build: { context: ./services-python/notifications, dockerfile: Dockerfile }
    restart: always
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    ports: ["8087:8087"]
    networks: [phantomgrid-net]

  tenant-manager:
    build: { context: ., dockerfile: services/tenant-manager/Dockerfile }
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    ports: ["8088:8088"]
    networks: [phantomgrid-net]

  integrations:
    build: { context: ., dockerfile: services/integrations/Dockerfile }
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    ports: ["8089:8089"]
    networks: [phantomgrid-net]

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    restart: always
    depends_on:
      api-gateway:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    ports: ["3000:3000"]
    networks: [phantomgrid-net]
