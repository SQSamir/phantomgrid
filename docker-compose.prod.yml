version: "3.9"

# =============================================================================
# PHANTOMGRID — Production Docker Compose override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# All secrets must be populated in .env before starting.
# =============================================================================

secrets:
  jwt_private_pem:
    file: ./secrets/jwt_private.pem
  jwt_public_pem:
    file: ./secrets/jwt_public.pem

x-common-env: &common-env
  POSTGRES_DSN: ${POSTGRES_DSN}
  REDIS_URL: ${REDIS_URL}
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
  KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
  KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:-}
  KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
  KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
  JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private.pem
  JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public.pem
  MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}

services:
  postgres:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  kafka:
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  api-gateway:
    environment:
      <<: *common-env
    secrets:
      - jwt_private_pem
      - jwt_public_pem
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  auth-service:
    environment:
      <<: *common-env
    secrets:
      - jwt_private_pem
      - jwt_public_pem
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  honeypot-engine:
    environment:
      <<: *common-env
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  event-processor:
    environment:
      <<: *common-env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  alert-engine:
    environment:
      <<: *common-env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  realtime:
    environment:
      <<: *common-env
    secrets:
      - jwt_public_pem
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      kafka:
        condition: service_healthy

  analytics:
    environment:
      <<: *common-env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  decoy-manager:
    environment:
      <<: *common-env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  tenant-manager:
    environment:
      <<: *common-env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  notifications:
    environment:
      <<: *common-env
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy

  integrations:
    environment:
      <<: *common-env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy

  mitre-mapper:
    environment:
      <<: *common-env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  kafka_data:
